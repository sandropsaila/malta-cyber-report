<!DOCTYPE html>
<html lang="en" style="background:#0a0c10;">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Secure Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      background-color: #0a0c10 !important;
      min-height: 100vh; width: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 36px; padding: 40px 20px;
      width: 100%; max-width: 320px; min-height: 100vh;
    }

    /* Lock icon */
    .lock-icon { opacity: 0.5; }

    /* PIN dots */
    .pin-dots { display: flex; gap: 20px; align-items: center; }
    .dot {
      width: 13px; height: 13px; border-radius: 50%;
      border: 2px solid #3a4255;
      background-color: transparent;
      transition: all 0.15s ease;
    }
    .dot.filled  { background-color: #e63946; border-color: #e63946; transform: scale(1.15); }
    .dot.error   { background-color: #e63946; border-color: #e63946; animation: shake 0.45s ease; }
    .dot.success { background-color: #2ec4b6; border-color: #2ec4b6; transform: scale(1.15); }

    @keyframes shake {
      0%,100%{transform:translateX(0);}
      20%{transform:translateX(-7px);}
      40%{transform:translateX(7px);}
      60%{transform:translateX(-4px);}
      80%{transform:translateX(4px);}
    }

    /* Keypad grid */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 80px);
      grid-template-rows: repeat(4, 80px);
      gap: 12px;
    }

    .key {
      width: 80px; height: 80px;
      background-color: #12151c;
      border: 1px solid #1e2430;
      border-radius: 50%;
      color: #d0d6e2;
      font-size: 26px;
      font-weight: 300;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.1s, transform 0.1s;
      position: relative; overflow: hidden;
    }
    .key:active, .key.pressed {
      background-color: #1c2232;
      transform: scale(0.93);
    }
    .key.del {
      background-color: transparent;
      border-color: transparent;
      font-size: 20px;
    }
    .key.del:active { background-color: #12151c; border-color: #1e2430; }

    /* Zero row positioning */
    .key.zero { grid-column: 2; }
    .key.del  { grid-column: 3; }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(230,57,70,0.18);
      transform: scale(0);
      animation: ripple 0.5s linear;
      pointer-events: none;
    }
    @keyframes ripple { to { transform: scale(4); opacity: 0; } }

    /* Error message */
    .msg {
      height: 14px;
      font-size: 11px; letter-spacing: 2.5px; text-transform: uppercase;
      color: #e63946; opacity: 0;
      transition: opacity 0.2s;
    }
    .msg.show { opacity: 1; }
  </style>
</head>
<body style="background-color:#0a0c10 !important;">
<div class="wrap">

  <!-- Lock SVG -->
  <svg class="lock-icon" width="52" height="58" viewBox="0 0 52 58" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="26" width="44" height="30" rx="5" stroke="#d0d6e2" stroke-width="2.5"/>
    <path d="M13 26V18C13 10.82 18.82 5 26 5s13 5.82 13 13v8" stroke="#d0d6e2" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="26" cy="40" r="3.5" fill="#d0d6e2"/>
    <line x1="26" y1="43.5" x2="26" y2="48" stroke="#d0d6e2" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <!-- PIN dots -->
  <div class="pin-dots">
    <div class="dot" id="d0"></div>
    <div class="dot" id="d1"></div>
    <div class="dot" id="d2"></div>
    <div class="dot" id="d3"></div>
  </div>

  <!-- Error message -->
  <div class="msg" id="msg">&#x2715;&nbsp; incorrect</div>

  <!-- Keypad -->
  <div class="keypad" id="keypad">
    <div class="key" data-n="1">1</div>
    <div class="key" data-n="2">2</div>
    <div class="key" data-n="3">3</div>
    <div class="key" data-n="4">4</div>
    <div class="key" data-n="5">5</div>
    <div class="key" data-n="6">6</div>
    <div class="key" data-n="7">7</div>
    <div class="key" data-n="8">8</div>
    <div class="key" data-n="9">9</div>
    <div class="key zero" data-n="0">0</div>
    <div class="key del" id="delKey">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
        <path d="M21 5H9L2 12l7 7h12V5z" stroke="#8892a4" stroke-width="2" stroke-linejoin="round"/>
        <line x1="14" y1="9" x2="18" y2="15" stroke="#8892a4" stroke-width="2" stroke-linecap="round"/>
        <line x1="18" y1="9" x2="14" y2="15" stroke="#8892a4" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

</div>
<script>
  // SHA-256 of "1122" — passcode never stored as plaintext
  const HASH = "b3282a2f2a28757b3a18ab833de16a9c54518c0b0cf493e3f0a7cf09386f326a";

  async function sha256(str) {
    const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  let pin = "", locked = false;
  const dots = [0,1,2,3].map(i => document.getElementById("d"+i));
  const msg  = document.getElementById("msg");

  function updateDots() {
    dots.forEach((d,i) => {
      d.classList.remove("error","success");
      i < pin.length ? d.classList.add("filled") : d.classList.remove("filled");
    });
  }

  function addRipple(el, e) {
    const r = document.createElement("span");
    r.classList.add("ripple");
    const rect = el.getBoundingClientRect();
    const sz = Math.max(rect.width, rect.height);
    const cx = (e.clientX ?? rect.left + rect.width/2) - rect.left - sz/2;
    const cy = (e.clientY ?? rect.top  + rect.height/2) - rect.top  - sz/2;
    r.style.cssText = `width:${sz}px;height:${sz}px;left:${cx}px;top:${cy}px;`;
    el.appendChild(r);
    setTimeout(() => r.remove(), 550);
  }

  async function checkPin() {
    const h = await sha256(pin);
    if (h === HASH) {
      dots.forEach(d => { d.classList.remove("filled"); d.classList.add("success"); });
      setTimeout(() => { window.location.replace("index.html"); }, 450);
    } else {
      dots.forEach(d => { d.classList.remove("filled"); d.classList.add("error"); });
      msg.classList.add("show");
      setTimeout(() => {
        dots.forEach(d => d.classList.remove("error","filled","success"));
        msg.classList.remove("show");
        pin = ""; locked = false;
      }, 900);
    }
  }

  document.getElementById("keypad").addEventListener("click", async (e) => {
    if (locked) return;
    const key = e.target.closest(".key");
    if (!key) return;
    addRipple(key, e);
    key.classList.add("pressed");
    setTimeout(() => key.classList.remove("pressed"), 150);
    if (key.id === "delKey") {
      pin = pin.slice(0, -1);
      msg.classList.remove("show");
      updateDots(); return;
    }
    const n = key.dataset.n;
    if (n === undefined || pin.length >= 4) return;
    pin += n; updateDots();
    if (pin.length === 4) { locked = true; setTimeout(checkPin, 120); }
  });
</script>
</body>
</html>
